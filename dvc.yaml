stages:
  data_ingestion:
    cmd: python src/data_ingestion.py --output data/raw/raw_data.csv
    deps:
      - src/data_ingestion.py
      - data/raw/Churn Prediction DataSet.csv
    outs:
      - data/raw/raw_data.csv

  data_preprocessing:
    cmd: python src/preprocessing.py --input data/raw/raw_data.csv --output data/processed
    deps:
      - src/preprocessing.py
      - data/raw/raw_data.csv
    outs:
      - data/processed/train.csv
      - data/processed/test.csv
      - models/scaler.pkl
      - models/encoders.pkl

  model_training:
    cmd: python src/train.py --data data/processed/train.csv --model-dir models --params params.yaml
    deps:
      - src/train.py
      - data/processed/train.csv
    params:
      - model.name
      - model.n_estimators
      - model.max_iter
      - model.max_depth
      - model.learning_rate
    outs:
      - models/${model.name}.pkl:
          cache: true

  model_evaluation:
    cmd: python src/evaluate.py --model-dir models --test-data data/processed/test.csv --metrics-dir metrics --params params.yaml
    deps:
      - src/evaluate.py
      - models/${model.name}.pkl
      - data/processed/test.csv
    params:
      - model.name
    metrics:
      - metrics/${model.name}.json:
          cache: false
